# ---------------- Optical Physical Model (Phase-B) ----------------
# 中文注释：选择光节点实体实现为 physical（不改 topo 文件格式）。
OPTICAL_NODE_IMPL physical

# 中文注释：光节点缓冲/准入参数（node 侧）。
OPTICAL_BUFFER_GAIN_PERMILLE 1300
OPTICAL_PHY_NODE_OEO_NS 25
OPTICAL_PHY_NODE_FEC_BASE_NS 15
OPTICAL_PHY_NODE_FEC_PER_KB_NS 1
OPTICAL_PHY_NODE_GUARD_NS 5
OPTICAL_PHY_NODE_RECONFIG_NS 50
OPTICAL_PHY_NODE_ADMISSION_SCALE_PERMILLE 760
OPTICAL_PHY_NODE_MIN_ADMISSION_BYTES 64

# 中文注释：光链路参数（channel 侧）。
OPTICAL_PHY_CHANNEL_ENABLE 1
OPTICAL_PHY_CHANNEL_FIXED_NS 35
OPTICAL_PHY_CHANNEL_FEC_PER_KB_NS 1
OPTICAL_PHY_CHANNEL_GUARD_NS 6
OPTICAL_PHY_CHANNEL_RECONFIG_NS 40
OPTICAL_PHY_CHANNEL_LOSS_RATE 0.0

# 中文注释：在 physical 模式下统一叠加发送侧物理开销，保证与 optical_2 有可观测差异。
OPTICAL_PHY_FORCE_TX_PENALTY_ENABLE 1
OPTICAL_PHY_FORCE_TX_PENALTY_NS 15000
OPTICAL_PHY_FORCE_TX_PER_KB_NS 4
